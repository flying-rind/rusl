# .cargo/config.toml — rusl 构建与测试配置
#
# 链接标志通过 build.rs 的 cargo:rustc-link-arg 输出,
# 避免 target 级 rustflags 泄漏到 build script 编译

[unstable]
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]
target-applies-to-host = false  # 重要：让标志不影响构建脚本

[target.'cfg(all())']
rustflags = ["-C", "panic=abort"]
